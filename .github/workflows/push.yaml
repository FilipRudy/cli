name: "Test of app-push"
on:
  push:
    branches:
      - oidc-test

permissions:
  contents: read
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go
      - name: build kyma binary
        run: make build
      - name: "get kubeconfig"
        id: oidc
        run: |
         ./bin/kyma alpha kubeconfig generate --audience "filip" --server "${API_SERVER_URL}" --certificate-authority-data "${CA_CRT}" --output kubeconfig.yaml
         echo 'kubeconfig<<EOF'  >> $GITHUB_OUTPUT
         cat "kubeconfig.yaml" >> $GITHUB_OUTPUT
         echo 'EOF' >> $GITHUB_OUTPUT
          
         kubeconfig64="$(cat "kubeconfig.yaml" | base64 -w 0)"
         echo "kubeconfig_base=${kubeconfig64}" >> $GITHUB_OUTPUT
        env:
          API_SERVER_URL: "${{ secrets.API_SERVER_URL }}"
          CA_CRT: "${{ secrets.CA_CERT }}"
      - name: "test"
        id: name
        shell: bash
        run: |
          export KUBECONFIG="${PWD}/kubeconfig.yaml"
          kubectl get pods -A
          sleep 360
          if kubectl get pods -A; then
            echo "SUCCESS: token is still valid after 6 minutes"
          else
            echo "FAILURE: kubectl failed - token may be expired"
            kubectl get pods -A 2>&1 || true
            exit 1
          fi
        env:
          KUBECONFIG_RAW: "${{ steps.oidc.outputs.kubeconfig }}"
